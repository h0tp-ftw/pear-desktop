name: Build Windows (manual)

# Manually build a Windows x64 installer + portable exe from this fork.
# How to use:
#   Actions tab -> "Build Windows (manual)" -> Run workflow -> pick a branch
#   (default: master) -> Run. When it finishes (~10-15 min), open the run and
#   download the "pear-desktop-windows" artifact. It contains:
#     - "YouTube Music Setup <version>.exe" -> offline installer (Start menu + uninstall)
#     - "YouTube Music <version>.exe"        -> portable, run directly, no install
#   Both reuse your existing settings (same app id).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'master'

permissions:
  contents: read

env:
  NODE_VERSION: '24.x'

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Offline NSIS installer + portable, x64 only. Overrides the config's
      # nsis-web/ia32/arm64 win targets to keep the build small and fast.
      - name: Build Windows (installer + portable, x64)
        run: |
          pnpm clean
          pnpm build
          pnpm electron-builder --win nsis portable --x64 -p never

      - name: Upload build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: pear-desktop-windows
          path: pack/*.exe
          retention-days: 14
          if-no-files-found: error
